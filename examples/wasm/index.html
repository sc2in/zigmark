# zigmark: Markdown at the Speed of Zig 🚀

> **A CommonMark + GFM-compliant Markdown parser, written in Zig, compiled to WebAssembly.**
>
> - 652/652 CommonMark spec tests passing ✅
> - 24/24 GFM extension tests passing ✅
> - Three renderers: HTML, AST, AI
> - Zero runtime dependencies
> - Blazing fast — often faster than JS!
>

## About

zigmark is a Markdown parser and renderer written in Zig, designed for speed, correctness, 
and embeddability. It supports HTML, AST, and AI-friendly output modes. 

Try switching renderers!

<!--
  marked.js is loaded purely for benchmarking comparison.
  zigmark does all the actual rendering.

<script src="https://cdn.jsdelivr.net/npm/marked@15/lib/marked.umd.min.js"></script>

<script type="module">
// ── Load WASM ────────────────────────────────────────────────────────────────
const WASM_PATH = 'zigmark.wasm';

let wasm;

async function initWasm() {
  const resp = await fetch(WASM_PATH);
  const bytes = await resp.arrayBuffer();
  const wasiImport = {
    args_get: () => 0,
    args_sizes_get: () => 0,
    environ_get: () => 0,
    environ_sizes_get: () => 0,
    fd_close: () => 0,
    fd_fdstat_get: () => 0,
    fd_filestat_get: () => 0,
    fd_read: () => 0,
    fd_seek: () => 0,
    fd_write: () => 0,
    fd_pwrite: () => 0,
    proc_exit: (code) => { throw new Error(`WASI proc_exit(${code})`); },
    clock_time_get: () => 0,
  };

  const { instance } = await WebAssembly.instantiate(bytes, {
    env: {
      // zigmark with page_allocator on wasm32-freestanding needs no imports,
      // but keep this object here so future additions don't break.
    },
    wasi_snapshot_preview1: wasiImport,
  });
  wasm = instance.exports;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const encoder = new TextEncoder();
const decoder = new TextDecoder();

function zigmarkRender(markdown, renderer) {
  const encoded = encoder.encode(markdown);
  const len = encoded.byteLength;

  // Allocate space in WASM memory and copy the source in.
  const ptr = wasm.alloc_buf(len);
  if (!ptr) return '<!-- alloc failed -->';
  new Uint8Array(wasm.memory.buffer, ptr, len).set(encoded);

  // Render using the selected renderer.
  let outPtr;
  if (renderer === 'html') {
    outPtr = wasm.render_html(ptr, len);
  } else if (renderer === 'ast') {
    outPtr = wasm.render_ast(ptr, len);
  } else if (renderer === 'ai') {
    outPtr = wasm.render_ai(ptr, len);
  } else {
    outPtr = wasm.render_html(ptr, len);
  }
  wasm.free_buf(ptr, len);

  if (!outPtr) return '<!-- render failed -->';
  const outLen = wasm.result_len();
  return decoder.decode(new Uint8Array(wasm.memory.buffer, outPtr, outLen));
}

// ── Benchmark helper ─────────────────────────────────────────────────────────
function bench(fn, iterations = 50) {
  // Warm up
  fn();
  const t0 = performance.now();
  for (let i = 0; i < iterations; i++) fn();
  return (performance.now() - t0) / iterations;
}

// ── UI ───────────────────────────────────────────────────────────────────────
const editor  = document.getElementById('editor');
const preview = document.getElementById('preview');
const zigTime = document.getElementById('zig-time');
const jsTime  = document.getElementById('js-time');
const speedup = document.getElementById('speedup');
const rendererSelect = document.getElementById('renderer-select');
const copyOutputBtn = document.getElementById('copy-output');

let debounce = null;

function update() {
  const md = editor.value;
  const renderer = rendererSelect.value;

  // zigmark (WASM)
  const zt = bench(() => zigmarkRender(md, renderer));
  const output = zigmarkRender(md, renderer);
  if (renderer === 'html') {
    preview.innerHTML = output;
  } else {
    preview.innerHTML = `<pre style="margin:0;">${escapeHtml(output)}</pre>`;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  // marked.js (JS, only for HTML)
  const jt = bench(() => marked.parse(md));

  zigTime.textContent = zt.toFixed(2);
  jsTime.textContent  = jt.toFixed(2);
  speedup.textContent = (jt / zt).toFixed(1);
}

editor.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(update, 80);
});
rendererSelect.addEventListener('change', update);
copyOutputBtn.addEventListener('click', () => {
  const renderer = rendererSelect.value;
  const md = editor.value;
  const output = zigmarkRender(md, renderer);
  navigator.clipboard.writeText(output);
  copyOutputBtn.textContent = 'Copied!';
  setTimeout(() => { copyOutputBtn.textContent = 'Copy Output'; }, 1200);
});

// ── Init ─────────────────────────────────────────────────────────────────────
try {
  await initWasm();
  update();
} catch (e) {
  preview.innerHTML =
    `<p style="color:#f85149">Failed to load <code>${WASM_PATH}</code>.</p>
     <p>Build it first:</p>
     <pre><code>cd examples/wasm && ./build.sh</code></pre>
     <p style="opacity:0.6;margin-top:8px">${e}</p>`;
}
</script>
